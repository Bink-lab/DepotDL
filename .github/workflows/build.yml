name: Build and Package

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 9
        uses: actions/setup-dotnet@3e891b0cb619bf60e2c25674b222b8940e2c1c25 # v4.2.0
        with:
          dotnet-version: '9.0.x'

      - name: Build DepotDL CLI (Windows)
        working-directory: DepotDL.CLI
        run: .\build.bat
        env:
          CI: true

      - name: Build DepotDL GUI (Windows)
        working-directory: DepotDL.GUI
        run: .\build.bat
        env:
          CI: true

      - name: Package CLI (Windows)
        shell: pwsh
        run: Compress-Archive -Path DepotDL.CLI/bin/Release/net9.0/win-x64/publish/* -DestinationPath cli-windows.zip -Force

      - name: Package GUI (Windows)
        shell: pwsh
        run: Compress-Archive -Path DepotDL.GUI/bin/Release/net9.0-windows/win-x64/publish/* -DestinationPath gui-windows.zip -Force

      - name: Install vpk tool
        run: dotnet tool install -g vpk --version 1.2.0

      - name: Pack GUI with Velopack
        shell: pwsh
        run: |
          $version = "1.0.${{ github.run_number }}"
          vpk pack `
            --packId DepotDL `
            --packVersion $version `
            --packDir DepotDL.GUI/bin/Release/net9.0-windows/win-x64/publish `
            --mainExe DepotDL.GUI.exe `
            --packTitle "DepotDL" `
            --outputDir velopack_releases

      - name: Upload CLI (Windows)
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v4.6.0
        with:
          name: cli-windows
          path: cli-windows.zip

      - name: Upload GUI (Windows)
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v4.6.0
        with:
          name: gui-windows
          path: gui-windows.zip

      - name: Upload Velopack Installer
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v4.6.0
        with:
          name: velopack
          path: velopack_releases/

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 9
        uses: actions/setup-dotnet@3e891b0cb619bf60e2c25674b222b8940e2c1c25 # v4.2.0
        with:
          dotnet-version: '9.0.x'

      - name: Build DepotDL CLI (Linux)
        working-directory: DepotDL.CLI
        run: |
          chmod +x build.sh
          ./build.sh
        env:
          CI: true

      - name: Package CLI (Linux)
        run: zip -j cli-linux.zip DepotDL.CLI/bin/Release/net9.0/linux-x64/publish/*

      - name: Upload CLI (Linux)
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v4.6.0
        with:
          name: cli-linux
          path: cli-linux.zip

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 9
        uses: actions/setup-dotnet@3e891b0cb619bf60e2c25674b222b8940e2c1c25 # v4.2.0
        with:
          dotnet-version: '9.0.x'

      - name: Build DepotDL CLI (macOS)
        working-directory: DepotDL.CLI
        run: |
          chmod +x build.sh
          ./build.sh osx-arm64
        env:
          CI: true

      - name: Package CLI (macOS)
        run: zip -j cli-macos.zip DepotDL.CLI/bin/Release/net9.0/osx-arm64/publish/*

      - name: Upload CLI (macOS)
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v4.6.0
        with:
          name: cli-macos
          path: cli-macos.zip

  create-nightly:
    name: Create Nightly Release
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get Build Info
        id: build_info
        run: |
          SHA=$(git rev-parse --short HEAD)
          BUILD_TIME=$(date -u +'%Y%m%d-%H%M%S')
          echo "SHA=$SHA" >> $GITHUB_OUTPUT
          echo "TAG=nightly-$BUILD_TIME-$SHA" >> $GITHUB_OUTPUT

      - name: Generate Release Notes
        id: generate_notes
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 2>/dev/null || git rev-list --max-parents=0 HEAD)
          echo "Using $PREVIOUS_TAG as base for changelog"

          {
            echo "## Nightly Build (${{ steps.build_info.outputs.SHA }})"
            echo "Automated build from the latest commit on the \`main\` branch."
            echo "Nightly builds may be unstable."
            echo ""
            CHANGES=$(git log "$PREVIOUS_TAG"..HEAD --pretty=format:"* %s (%h)")
            if [ -z "$CHANGES" ]; then
              echo "No new changes since last build."
            else
              echo "### Changes since $PREVIOUS_TAG"
              echo "$CHANGES"
            fi
            echo ""
            echo ""
            echo "**Compare:** https://github.com/${{ github.repository }}/compare/$PREVIOUS_TAG...main"
          } > release_notes.md

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare Assets
        run: |
          SHA=${{ steps.build_info.outputs.SHA }}
          mkdir release_assets
          cp artifacts/cli-windows/cli-windows.zip release_assets/DepotDL.CLI-Windows-x64-$SHA.zip
          cp artifacts/gui-windows/gui-windows.zip release_assets/DepotDL.GUI-Windows-x64-$SHA.zip
          cp artifacts/cli-linux/cli-linux.zip     release_assets/DepotDL.CLI-Linux-x64-$SHA.zip
          cp artifacts/cli-macos/cli-macos.zip     release_assets/DepotDL.CLI-macOS-arm64-$SHA.zip
          cp -r artifacts/velopack/.                release_assets/

      - name: Create Annotated Tag
        run: |
          TAG="${{ steps.build_info.outputs.TAG }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git rev-parse "$TAG" >/dev/null 2>&1; then
            git tag -a "$TAG" -m "Nightly Build (${{ steps.build_info.outputs.SHA }})"
            git push origin "$TAG"
          fi

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.build_info.outputs.TAG }}
          name: Nightly Build (${{ steps.build_info.outputs.SHA }})
          body_path: release_notes.md
          prerelease: true
          files: release_assets/*
          generate_release_notes: false
          make_latest: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
