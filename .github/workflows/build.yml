name: Build and Package

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 9
        uses: actions/setup-dotnet@3e891b0cb619bf60e2c25674b222b8940e2c1c25 # v4.2.0
        with:
          dotnet-version: '9.0.x'

      - name: Build DepotDownloaderMod
        working-directory: DepotDownloaderMod
        run: .\build.bat
        env:
          CI: true

      - name: Get Build Info
        id: build_info
        shell: bash
        run: |
          SHA_SHORT=$(git rev-parse --short HEAD)
          echo "SHA=$SHA_SHORT" >> $GITHUB_OUTPUT

      - name: Build DepotDL CLI (Windows)
        working-directory: DepotDL.CLI
        run: .\build.bat
        env:
          CI: true

      - name: Build DepotDL GUI (Windows)
        working-directory: DepotDL.GUI
        run: .\build.bat
        env:
          CI: true

      - name: Package CLI (Windows)
        shell: pwsh
        run: |
          Compress-Archive -Path DepotDL.CLI/bin/Release/net9.0/win-x64/publish/* -DestinationPath DepotDL.CLI-Windows-x64-${{ steps.build_info.outputs.SHA }}.zip -Force

      - name: Package GUI (Windows)
        shell: pwsh
        run: |
          Compress-Archive -Path DepotDL.GUI/bin/Release/net9.0-windows/win-x64/publish/* -DestinationPath DepotDL.GUI-Windows-x64-${{ steps.build_info.outputs.SHA }}.zip -Force

      - name: Install vpk tool
        run: dotnet tool install -g vpk --version 0.0.1298

      - name: Pack GUI with Velopack
        shell: pwsh
        run: |
          $version = "1.0.${{ github.run_number }}"
          vpk pack `
            --packId DepotDL `
            --packVersion $version `
            --packDir DepotDL.GUI/bin/Release/net9.0-windows/win-x64/publish `
            --mainExe DepotDL.GUI.exe `
            --packTitle "DepotDL" `
            --outputDir velopack_releases

      - name: Upload CLI (Windows)
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v4.6.0
        with:
          name: DepotDL.CLI-Windows-x64-${{ steps.build_info.outputs.SHA }}
          path: DepotDL.CLI-Windows-x64-${{ steps.build_info.outputs.SHA }}.zip

      - name: Upload GUI (Windows)
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v4.6.0
        with:
          name: DepotDL.GUI-Windows-x64-${{ steps.build_info.outputs.SHA }}
          path: DepotDL.GUI-Windows-x64-${{ steps.build_info.outputs.SHA }}.zip

      - name: Upload Velopack Installer
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v4.6.0
        with:
          name: DepotDL-Setup-${{ steps.build_info.outputs.SHA }}
          path: velopack_releases/

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 9
        uses: actions/setup-dotnet@3e891b0cb619bf60e2c25674b222b8940e2c1c25 # v4.2.0
        with:
          dotnet-version: '9.0.x'

      - name: Build DepotDownloaderMod
        working-directory: DepotDownloaderMod
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Get Build Info
        id: build_info
        shell: bash
        run: |
          SHA_SHORT=$(git rev-parse --short HEAD)
          echo "SHA=$SHA_SHORT" >> $GITHUB_OUTPUT

      - name: Build DepotDL CLI (Linux)
        working-directory: DepotDL.CLI
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Package CLI (Linux)
        run: |
          zip -j DepotDL.CLI-Linux-x64-${{ steps.build_info.outputs.SHA }}.zip DepotDL.CLI/bin/Release/net9.0/linux-x64/publish/*

      - name: Upload CLI (Linux)
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v4.6.0
        with:
          name: DepotDL.CLI-Linux-x64-${{ steps.build_info.outputs.SHA }}
          path: DepotDL.CLI-Linux-x64-${{ steps.build_info.outputs.SHA }}.zip

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 9
        uses: actions/setup-dotnet@3e891b0cb619bf60e2c25674b222b8940e2c1c25 # v4.2.0
        with:
          dotnet-version: '9.0.x'

      - name: Build DepotDownloaderMod
        working-directory: DepotDownloaderMod
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Get Build Info
        id: build_info
        shell: bash
        run: |
          SHA_SHORT=$(git rev-parse --short HEAD)
          echo "SHA=$SHA_SHORT" >> $GITHUB_OUTPUT

      - name: Build DepotDL CLI (macOS)
        working-directory: DepotDL.CLI
        run: |
          chmod +x build-macos.sh
          ./build-macos.sh osx-arm64

      - name: Package CLI (macOS)
        run: |
          zip -j DepotDL.CLI-macOS-arm64-${{ steps.build_info.outputs.SHA }}.zip DepotDL.CLI/bin/Release/net9.0/osx-arm64/publish/*

      - name: Upload CLI (macOS)
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v4.6.0
        with:
          name: DepotDL.CLI-macOS-arm64-${{ steps.build_info.outputs.SHA }}
          path: DepotDL.CLI-macOS-arm64-${{ steps.build_info.outputs.SHA }}.zip

  create-nightly:
    name: Create Nightly Release
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get Build Info
        id: build_info
        run: |
          SHA=$(git rev-parse --short HEAD)
          BUILD_TIME=$(date -u +'%Y%m%d-%H%M%S')
          echo "SHA=$SHA" >> $GITHUB_OUTPUT
          echo "TAG=nightly-$BUILD_TIME-$SHA" >> $GITHUB_OUTPUT

      - name: Generate Release Notes
        id: generate_notes
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -z "$PREVIOUS_TAG" ]; then
            PREVIOUS_TAG=$(git rev-list --max-parents=0 HEAD)
          fi

          echo "Using $PREVIOUS_TAG as base for changelog"

          echo "## Nightly Build (${{ steps.build_info.outputs.SHA }})" > release_notes.md
          echo "Automated build from the latest commit on the \`main\` branch." >> release_notes.md
          echo "Nightly builds may be unstable." >> release_notes.md
          echo "" >> release_notes.md

          NEW_COMMITS=$(git log $PREVIOUS_TAG..HEAD --oneline)
          if [ -z "$NEW_COMMITS" ]; then
            echo "No new changes since last build." >> release_notes.md
          else
            echo "### Changes since $PREVIOUS_TAG" >> release_notes.md
            git log $PREVIOUS_TAG..HEAD --oneline --pretty=format:"* %s (%h)" >> release_notes.md
          fi

          echo "" >> release_notes.md
          echo "" >> release_notes.md
          echo "**Compare:** https://github.com/${{ github.repository }}/compare/$PREVIOUS_TAG...main" >> release_notes.md

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare Assets
        run: |
          mkdir release_assets
          SHA=${{ steps.build_info.outputs.SHA }}
          echo "Commit SHA: $SHA"

          CLI_WIN=$(find artifacts -name "DepotDL.CLI-Windows-x64-*.zip" | head -n 1)
          cp "$CLI_WIN" "release_assets/DepotDL.CLI-Windows-x64-$SHA.zip"

          GUI_WIN=$(find artifacts -name "DepotDL.GUI-Windows-x64-*.zip" | head -n 1)
          cp "$GUI_WIN" "release_assets/DepotDL.GUI-Windows-x64-$SHA.zip"

          CLI_LIN=$(find artifacts -name "DepotDL.CLI-Linux-x64-*.zip" | head -n 1)
          cp "$CLI_LIN" "release_assets/DepotDL.CLI-Linux-x64-$SHA.zip"

          CLI_MAC=$(find artifacts -name "DepotDL.CLI-macOS-arm64-*.zip" | head -n 1)
          cp "$CLI_MAC" "release_assets/DepotDL.CLI-macOS-arm64-$SHA.zip"

          SETUP_DIR=$(find artifacts -name "DepotDL-Setup-*" -type d | head -n 1)
          if [ -n "$SETUP_DIR" ]; then
            cp "$SETUP_DIR"/* release_assets/ 2>/dev/null || true
          fi

          echo "Final assets for release:"
          ls -R release_assets/

      - name: Create Annotated Tag
        run: |
          TAG="${{ steps.build_info.outputs.TAG }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git rev-parse "$TAG" >/dev/null 2>&1; then
            git tag -a "$TAG" -m "Nightly Build (${{ steps.build_info.outputs.SHA }})"
            git push origin "$TAG"
          fi

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.build_info.outputs.TAG }}
          name: Nightly Build (${{ steps.build_info.outputs.SHA }})
          body_path: release_notes.md
          prerelease: true
          files: release_assets/*
          generate_release_notes: false
          make_latest: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
